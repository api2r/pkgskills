name: "Install R and dependencies"
description: "Set up pandoc, R, and package dependencies"
inputs:
  token:
    description: "GitHub token, set to secrets.GITHUB_TOKEN"
    required: true
  r-version:
    description: "R version, passed to r-lib/actions/setup-r@v2"
    required: false
    default: release
  http-user-agent:
    description: "HTTP user agent, passed to r-lib/actions/setup-r@v2"
    required: false
    default: ""
  needs:
    description: "Config/Needs tag(s), passed to r-lib/actions/setup-r-dependencies@v2"
    required: false
    default: ""
  extra-packages:
    description: "Extra packages, passed to r-lib/actions/setup-r-dependencies@v2"
    required: false
    default: any::rcmdcheck
  optional-packages:
    description: "Optional extra packages; installed individually, warn (not error) on failure"
    required: false
    default: ""
  cache-version:
    description: "Cache version for r-lib/actions/setup-r-dependencies@v2"
    required: false
    default: "1"
  use-container:
    description: "Set to 'true' when running inside a pre-warmed container (skips R and pandoc setup)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - if: inputs.use-container != 'true'
      uses: r-lib/actions/setup-pandoc@v2

    - uses: r-lib/actions/setup-r@v2
      with:
        install-r: ${{ inputs.use-container != 'true' }}
        r-version: ${{ inputs.r-version }}
        http-user-agent: ${{ inputs.http-user-agent }}
        use-public-rspm: true

    # In pre-warmed containers every package may already be in the system
    # library, so nothing is ever written to R_LIBS_USER.  Ensure the
    # directory exists with a sentinel so the actions/cache glob matches
    # and the "Path Validation Error" warning doesn't fire at cache-save.
    - if: inputs.use-container == 'true'
      name: Ensure R_LIBS_USER exists
      shell: bash
      run: |
        lib="$(Rscript -e 'cat(Sys.getenv("R_LIBS_USER"))')"
        mkdir -p "$lib"
        touch "$lib/.keep"

    # When running in a pre-warmed container, point pak at the system library
    # so it recognises already-installed packages instead of starting from an
    # empty slate.  upgrade: TRUE ensures any stale packages are refreshed.
    # For bare runners keep the reproducible defaults (empty lib, no upgrade).
    - id: rdeps-params
      name: Compute setup-r-dependencies parameters
      shell: bash
      run: |
        if [ "${{ inputs.use-container }}" = "true" ]; then
          echo "lockfile-create-lib='.Library'" >> "$GITHUB_OUTPUT"
          echo "upgrade=TRUE" >> "$GITHUB_OUTPUT"
        else
          echo "lockfile-create-lib=NULL" >> "$GITHUB_OUTPUT"
          echo "upgrade=FALSE" >> "$GITHUB_OUTPUT"
        fi

    - uses: r-lib/actions/setup-r-dependencies@v2
      env:
        GITHUB_PAT: ${{ inputs.token }}
      with:
        needs: ${{ inputs.needs }}
        extra-packages: ${{ inputs.extra-packages }}
        cache-version: ${{ inputs.cache-version }}
        lockfile-create-lib: ${{ steps.rdeps-params.outputs.lockfile-create-lib }}
        upgrade: ${{ steps.rdeps-params.outputs.upgrade }}

    - if: inputs.optional-packages != ''
      name: Install optional packages
      shell: Rscript {0}
      env:
        GITHUB_PAT: ${{ inputs.token }}
      run: |
        pkgs <- strsplit("${{ inputs.optional-packages }}", "\\s+")[[1]]
        pkgs <- pkgs[nzchar(pkgs)]
        for (pkg in pkgs) {
          tryCatch(
            pak::pak(pkg),
            error = function(e) {
              msg <- sprintf("Failed to install optional package %s: %s", pkg, conditionMessage(e))
              msg <- gsub("[\r\n]+", " ", msg)
              cat("::warning::", msg, "\n", sep = "")
            }
          )
        }
