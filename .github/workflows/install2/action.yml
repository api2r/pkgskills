name: "Install R dependencies (container)"
description: "Lightweight dependency install for pre-warmed containers. Skips R and pandoc setup (already in image) and uses pak directly."
inputs:
  token:
    description: "GitHub token, set to secrets.GITHUB_TOKEN"
    required: true
  extra-packages:
    description: "Extra packages (space-separated pak refs, same format as r-lib/actions)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install or update R dependencies
      shell: Rscript {0}
      env:
        GITHUB_PAT: ${{ inputs.token }}
      run: |
        pkgs <- strsplit(trimws("${{ inputs.extra-packages }}"), "\\s+")[[1]]
        pkgs <- pkgs[nzchar(pkgs)]
        if (length(pkgs) > 0) {
          cat("Installing", length(pkgs), "package refs with pak...\n")
          pak::pak(pkgs)
        }
        cat("Done.\n")
